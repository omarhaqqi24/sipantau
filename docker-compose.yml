services:
  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/var/www
      - laravel_vendor:/var/www/vendor
    depends_on:
      - mysql
    expose:
      - 9000

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  ml:
    build: ./ml-service
    container_name: ml-service
    volumes:
      - ./ml-service:/app

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    expose:
      - 3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true

volumes:
  mysql_data:
  laravel_vendor: